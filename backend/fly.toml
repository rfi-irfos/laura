app = "laura-beacon"
primary_region = "fra"

[build]

[env]
  PORT = "3000"
  DB_PATH = "/data/laura.db"

[[mounts]]
  source = "laura_data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
